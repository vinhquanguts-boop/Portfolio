<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 465" width="760" height="465">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2A1018"/><stop offset="35%" stop-color="#3D1C24"/>
      <stop offset="65%" stop-color="#5C2E38"/><stop offset="100%" stop-color="#4A2430"/>
    </linearGradient>
    <filter id="sh"><feDropShadow dx="0" dy="30" stdDeviation="40" flood-color="rgba(0,0,0,.7)"/><feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="rgba(92,46,56,.5)"/></filter>
    <clipPath id="c"><rect x="0" y="0" width="760" height="465" rx="40" ry="40"/></clipPath>
  </defs>
  <g filter="url(#sh)"><g clip-path="url(#c)">
    <rect x="0" y="0" width="760" height="465" fill="url(#bg)"/>
    <!-- texture -->
    <line x1="0" y1="0" x2="760" y2="465" stroke="rgba(196,163,90,.04)" stroke-width="1"/>
    <line x1="0" y1="80" x2="680" y2="465" stroke="rgba(196,163,90,.03)" stroke-width="1"/>
    <line x1="0" y1="160" x2="600" y2="465" stroke="rgba(196,163,90,.03)" stroke-width="1"/>
    <!-- mag strip -->
    <rect x="0" y="80" width="760" height="100" fill="#0A0808"/>
    <rect x="0" y="80" width="760" height="2" fill="rgba(255,255,255,.06)"/>
    <!-- sig strip -->
    <rect x="56" y="210" width="520" height="80" rx="4" fill="none"/>
    <rect x="56" y="210" width="520" height="80" rx="4" fill="url(#sigPat)"/>
    <pattern id="sigPat" x="0" y="0" width="16" height="80" patternUnits="userSpaceOnUse">
      <rect x="0" y="0" width="8" height="80" fill="#F8F0E8"/><rect x="8" y="0" width="8" height="80" fill="#EEE4D8"/>
    </pattern>
    <rect x="56" y="210" width="520" height="80" rx="4" fill="url(#sigPat)" opacity=".9"/>
    <text x="100" y="258" font-family="Georgia,serif" font-size="14" fill="rgba(92,46,56,.5)" font-weight="600" letter-spacing="2">CVV</text>
    <text x="148" y="258" font-family="Georgia,serif" font-size="18" fill="#3D1C24" letter-spacing="3">482</text>
    <!-- vault mark back -->
    <circle cx="668" cy="250" r="28" fill="#7D3D4A" stroke="rgba(196,163,90,.3)" stroke-width="1"/>
    <path d="M 656 242 L 668 263 L 680 242" stroke="rgba(255,236,190,.85)" stroke-width="5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="668" y="296" font-family="Georgia,serif" font-size="12" fill="rgba(255,236,190,.7)" text-anchor="middle" letter-spacing="2">VAULT</text>
    <!-- fine print -->
    <text x="56" y="340" font-family="Arial,sans-serif" font-size="10" fill="rgba(196,163,90,.4)">Issued by Vault Financial Pty Ltd. This card is the property of Vault and must be returned upon request.</text>
    <text x="56" y="355" font-family="Arial,sans-serif" font-size="10" fill="rgba(196,163,90,.4)">Use subject to the Cardholder Agreement. Support: 1800 VAULT AU  ·  vault.com.au</text>
    <!-- tagline -->
    <text x="56" y="390" font-family="Georgia,serif" font-size="11" fill="rgba(196,163,90,.35)" letter-spacing="3">YOUR MONEY · BEAUTIFULLY KEPT</text>
    <!-- mastercard circles -->
    <circle cx="676" cy="392" r="24" fill="#C4A35A" opacity=".82"/>
    <circle cx="704" cy="392" r="24" fill="#E8D08A" opacity=".78"/>
    <!-- frame -->
    <rect x="0" y="0" width="760" height="465" rx="40" ry="40" fill="none" stroke="rgba(255,255,255,.07)" stroke-width="2"/>
  </g></g>
</svg>
