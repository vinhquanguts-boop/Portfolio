<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 560" width="560" height="560" id="img04">
  <!-- IMG-04: Bank linking / CDR -->
  <defs>
    <linearGradient id="bg04" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FDF0EB"/>
      <stop offset="100%" stop-color="#F9E2DA"/>
    </linearGradient>
    <linearGradient id="phone04" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2A1018"/>
      <stop offset="100%" stop-color="#1A0A10"/>
    </linearGradient>
    <linearGradient id="bankGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5C2E38"/>
      <stop offset="100%" stop-color="#7D3D4A"/>
    </linearGradient>
    <filter id="sh04">
      <feDropShadow dx="0" dy="12" stdDeviation="24" flood-color="#5C2E38" flood-opacity=".22"/>
    </filter>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#5C2E38" stop-opacity="0"/>
      <stop offset="50%" stop-color="#C4A35A" stop-opacity=".8"/>
      <stop offset="100%" stop-color="#5C2E38" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="560" height="560" fill="url(#bg04)"/>

  <!-- Background ring decoration -->
  <circle cx="280" cy="280" r="240" fill="none" stroke="#5C2E38" stroke-width="1" opacity=".05"/>
  <circle cx="280" cy="280" r="180" fill="none" stroke="#C4A35A" stroke-width="1" opacity=".07"/>
  <circle cx="280" cy="280" r="120" fill="none" stroke="#5C2E38" stroke-width="1" opacity=".05"/>

  <!-- Animated connection line -->
  <line x1="100" y1="280" x2="460" y2="280" stroke="url(#lineGrad)" stroke-width="2.5" stroke-dasharray="8 4"/>

  <!-- Left bank icon -->
  <g transform="translate(60, 220)" filter="url(#sh04)">
    <rect x="0" y="0" width="130" height="120" rx="20" fill="#F9E2DA" stroke="#EDD5C8" stroke-width="1.5"/>
    <!-- Bank columns -->
    <rect x="20" y="50" width="12" height="44" rx="2" fill="#5C2E38" opacity=".6"/>
    <rect x="40" y="44" width="12" height="50" rx="2" fill="#5C2E38" opacity=".7"/>
    <rect x="60" y="38" width="12" height="56" rx="2" fill="#5C2E38" opacity=".8"/>
    <rect x="80" y="44" width="12" height="50" rx="2" fill="#5C2E38" opacity=".7"/>
    <rect x="100" y="50" width="12" height="44" rx="2" fill="#5C2E38" opacity=".6"/>
    <rect x="14" y="94" width="102" height="8" rx="2" fill="#5C2E38" opacity=".5"/>
    <rect x="22" y="30" width="86" height="12" rx="4" fill="#5C2E38" opacity=".4"/>
    <!-- Triangle top -->
    <polygon points="65,14 22,30 108,30" fill="#5C2E38" opacity=".5"/>
    <text x="65" y="115" font-family="Inter,sans-serif" font-size="8" fill="#C4897A" text-anchor="middle" letter-spacing="1">YOUR BANK</text>
  </g>

  <!-- Central connection node -->
  <g transform="translate(230, 238)" filter="url(#sh04)">
    <circle cx="50" cy="50" r="46" fill="#5C2E38"/>
    <circle cx="50" cy="50" r="38" fill="none" stroke="rgba(196,163,90,.3)" stroke-width="1.5"/>
    <!-- Shield icon -->
    <path d="M 50 24 L 70 32 L 70 48 Q 70 62 50 72 Q 30 62 30 48 L 30 32 Z" fill="rgba(196,163,90,.9)"/>
    <!-- Checkmark -->
    <path d="M 40 50 L 48 58 L 62 42" stroke="#5C2E38" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="50" y="92" font-family="Inter,sans-serif" font-size="8" fill="rgba(196,163,90,.8)" text-anchor="middle" letter-spacing="1">CDR</text>
  </g>

  <!-- Right Vault icon -->
  <g transform="translate(370, 220)" filter="url(#sh04)">
    <rect x="0" y="0" width="130" height="120" rx="20" fill="url(#bankGrad)"/>
    <circle cx="65" cy="42" r="28" fill="#7D3D4A" stroke="rgba(196,163,90,.3)" stroke-width="1"/>
    <circle cx="65" cy="42" r="22" fill="none" stroke="rgba(196,163,90,.2)" stroke-width="1"/>
    <path d="M 54 34 L 65 53 L 76 34" stroke="rgba(255,236,190,.85)" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="65" y="82" font-family="Georgia,serif" font-size="14" fill="rgba(255,236,190,.85)" text-anchor="middle" letter-spacing="2">VAULT</text>
    <text x="65" y="112" font-family="Inter,sans-serif" font-size="8" fill="rgba(196,163,90,.6)" text-anchor="middle" letter-spacing="1">CONNECTED</text>
  </g>

  <!-- Connection dots animated -->
  <circle cx="210" cy="280" r="5" fill="#C4A35A" opacity=".7"/>
  <circle cx="240" cy="280" r="4" fill="#C4A35A" opacity=".5"/>
  <circle cx="320" cy="280" r="4" fill="#C4A35A" opacity=".5"/>
  <circle cx="350" cy="280" r="5" fill="#C4A35A" opacity=".7"/>

  <!-- Status text -->
  <text x="280" y="390" font-family="Inter,sans-serif" font-size="11" fill="#5C2E38" font-weight="700" text-anchor="middle">Secure Open Banking Connection</text>
  <text x="280" y="410" font-family="Inter,sans-serif" font-size="10" fill="#C4897A" text-anchor="middle">Australian CDR · Read-only access · 256-bit encrypted</text>

  <!-- Trust marks -->
  <rect x="160" y="430" width="240" height="40" rx="10" fill="#F9E2DA" stroke="#EDD5C8" stroke-width="1"/>
  <text x="180" y="455" font-family="Inter,sans-serif" font-size="9" fill="#C4897A">🔒 Bank-grade security · OAIC compliant</text>

  <text x="280" y="520" font-family="Inter,sans-serif" font-size="9" fill="rgba(196,137,122,.4)" text-anchor="middle" letter-spacing="2">VAULT · BANK LINKING</text>
</svg>
