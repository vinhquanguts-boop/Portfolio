<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 390" role="img" aria-labelledby="title">
  <title id="title">Vault debit card</title>
  <defs>
    <linearGradient id="cardBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a1018"/>
      <stop offset="0.22" stop-color="#4a2430"/>
      <stop offset="0.42" stop-color="#5c2e38"/>
      <stop offset="0.62" stop-color="#7d3d4a"/>
      <stop offset="0.78" stop-color="#6b3340"/>
      <stop offset="1" stop-color="#3d1c24"/>
    </linearGradient>
    <linearGradient id="chipGold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#b8923c"/>
      <stop offset="0.28" stop-color="#e8ce7a"/>
      <stop offset="0.54" stop-color="#c8a248"/>
      <stop offset="0.78" stop-color="#a07a2c"/>
      <stop offset="1" stop-color="#d4b860"/>
    </linearGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fff0c8" stop-opacity="0"/>
      <stop offset="0.36" stop-color="#fff0c8" stop-opacity="0"/>
      <stop offset="0.47" stop-color="#c4a35a" stop-opacity=".15"/>
      <stop offset="0.5" stop-color="#fff8dc" stop-opacity=".25"/>
      <stop offset="0.55" stop-color="#c4a35a" stop-opacity=".13"/>
      <stop offset="0.66" stop-color="#fff0c8" stop-opacity="0"/>
      <stop offset="1" stop-color="#fff0c8" stop-opacity="0"/>
    </linearGradient>
    <pattern id="engrave" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(32)">
      <path d="M0 0h1v10H0z" fill="#ffe6b4" opacity=".35"/>
    </pattern>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="18" flood-color="#3d1c24" flood-opacity=".28"/>
    </filter>
  </defs>

  <g filter="url(#softShadow)">
    <rect x="18" y="18" width="604" height="354" rx="34" fill="url(#cardBase)"/>
    <rect x="18" y="18" width="604" height="354" rx="34" fill="url(#engrave)" opacity=".13"/>
    <ellipse cx="480" cy="94" rx="210" ry="170" fill="#c4a35a" opacity=".12"/>
    <ellipse cx="130" cy="322" rx="220" ry="170" fill="#7d3d4a" opacity=".42"/>
    <circle cx="552" cy="58" r="158" fill="none" stroke="#c4a35a" stroke-opacity=".13" stroke-width="2"/>
    <circle cx="552" cy="58" r="190" fill="none" stroke="#c4a35a" stroke-opacity=".07" stroke-width="22"/>
    <circle cx="552" cy="58" r="234" fill="none" stroke="#c4a35a" stroke-opacity=".045" stroke-width="28"/>
    <circle cx="-22" cy="386" r="168" fill="none" stroke="#c4a35a" stroke-opacity=".08" stroke-width="2"/>
    <circle cx="-22" cy="386" r="202" fill="none" stroke="#c4a35a" stroke-opacity=".04" stroke-width="28"/>
    <path d="M160 0c72 108 74 224-30 390h150c116-152 126-300 28-390z" fill="url(#shine)" opacity=".95"/>
    <rect x="18" y="18" width="604" height="354" rx="34" fill="none" stroke="#ffe6b4" stroke-opacity=".10"/>

    <g transform="translate(62 60)">
      <circle cx="26" cy="26" r="25" fill="#3d1c24" fill-opacity=".45" stroke="#c4a35a" stroke-opacity=".48" stroke-width="1.6"/>
      <circle cx="26" cy="26" r="20" fill="none" stroke="#ffe6b4" stroke-opacity=".16" stroke-dasharray="2 4"/>
      <text x="26" y="37" text-anchor="middle" fill="#ffe6b4" fill-opacity=".88" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="32">V</text>
    </g>
    <text x="132" y="97" fill="#ffecc0" fill-opacity=".9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="38" letter-spacing="14">VAULT</text>

    <rect x="500" y="58" width="106" height="36" rx="8" fill="#c4a35a" fill-opacity=".06" stroke="#c4a35a" stroke-opacity=".36"/>
    <text x="553" y="81" text-anchor="middle" fill="#c4a35a" fill-opacity=".86" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="2">VISA DEBIT</text>

    <g transform="translate(66 132)">
      <rect width="64" height="46" rx="8" fill="url(#chipGold)"/>
      <path d="M0 23h64M32 0v46M0 10h64M0 36h64" stroke="#2a1018" stroke-opacity=".22" stroke-width="1.8"/>
      <rect width="64" height="46" rx="8" fill="none" stroke="#fff7d6" stroke-opacity=".12"/>
    </g>
    <g transform="translate(146 143)" fill="none" stroke="#c4a35a" stroke-opacity=".76" stroke-width="2" stroke-linecap="round">
      <path d="M2 20a15 15 0 0 1 0-20"/>
      <path d="M7 15a8 8 0 0 1 0-10"/>
      <path d="M22 0a15 15 0 0 1 0 20"/>
      <path d="M17 5a8 8 0 0 1 0 10"/>
    </g>

    <text x="66" y="248" fill="#ffecc0" fill-opacity=".84" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="31" letter-spacing="12">5412 &#8226;&#8226;&#8226;&#8226; &#8226;&#8226;&#8226;&#8226; 8821</text>

    <text x="66" y="312" fill="#c4a35a" fill-opacity=".70" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="3">CARD HOLDER</text>
    <text x="66" y="342" fill="#ffecc0" fill-opacity=".9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="700" letter-spacing="1.4">SARAH CHEN</text>

    <text x="510" y="296" fill="#c4a35a" fill-opacity=".70" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="3">EXPIRES</text>
    <text x="510" y="326" fill="#ffecc0" fill-opacity=".9" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="1.5">09 / 28</text>
    <circle cx="542" cy="346" r="27" fill="#c4a35a" opacity=".86"/>
    <circle cx="576" cy="346" r="27" fill="#e8d08a" opacity=".82"/>
  </g>
