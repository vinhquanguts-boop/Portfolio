<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="bgMetals" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1A0A10"/>
      <stop offset="50%" stop-color="#2A1018"/>
      <stop offset="100%" stop-color="#3D1C24"/>
    </linearGradient>
    <linearGradient id="goldBar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0D878"/>
      <stop offset="25%" stop-color="#C4A35A"/>
      <stop offset="50%" stop-color="#E8C97A"/>
      <stop offset="75%" stop-color="#A8832A"/>
      <stop offset="100%" stop-color="#C4A35A"/>
    </linearGradient>
    <linearGradient id="goldBarSide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A8832A"/>
      <stop offset="100%" stop-color="#7A5C18"/>
    </linearGradient>
    <linearGradient id="goldBarTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0E090"/>
      <stop offset="50%" stop-color="#D4B040"/>
      <stop offset="100%" stop-color="#B89028"/>
    </linearGradient>
    <linearGradient id="silverBar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8E8F0"/>
      <stop offset="25%" stop-color="#A8B0C0"/>
      <stop offset="50%" stop-color="#D8DCE8"/>
      <stop offset="75%" stop-color="#888EA0"/>
      <stop offset="100%" stop-color="#A8B0C0"/>
    </linearGradient>
    <linearGradient id="silverBarSide" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7880A0"/>
      <stop offset="100%" stop-color="#505870"/>
    </linearGradient>
    <linearGradient id="silverBarTop" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F0F0F8"/>
      <stop offset="50%" stop-color="#C0C8D8"/>
      <stop offset="100%" stop-color="#A0A8C0"/>
    </linearGradient>
    <linearGradient id="vaultDoor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4A3020"/>
      <stop offset="50%" stop-color="#382010"/>
      <stop offset="100%" stop-color="#261008"/>
    </linearGradient>
    <radialGradient id="goldGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#C4A35A" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#C4A35A" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="centerLight" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#F0D878" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#C4A35A" stop-opacity="0"/>
    </radialGradient>
    <filter id="barShadow">
      <feDropShadow dx="8" dy="16" stdDeviation="20" flood-color="#000" flood-opacity=".5"/>
    </filter>
    <filter id="glowFilter">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Dark vault background -->
  <rect width="1200" height="675" fill="url(#bgMetals)"/>

  <!-- Vault interior wall texture - subtle panels -->
  <rect x="0" y="0" width="1200" height="675" fill="none" stroke="rgba(196,163,90,.03)" stroke-width="60"/>

  <!-- Background atmospheric glow -->
  <ellipse cx="600" cy="350" rx="500" ry="300" fill="url(#centerLight)"/>
  <ellipse cx="600" cy="380" rx="280" ry="180" fill="url(#goldGlow)"/>

  <!-- Vault shelf surface -->
  <rect x="0" y="480" width="1200" height="200" fill="#1A0A10"/>
  <rect x="0" y="478" width="1200" height="4" fill="#2E1818"/>
  <!-- Shelf edge highlight -->
  <rect x="0" y="478" width="1200" height="1.5" fill="rgba(196,163,90,.2)"/>

  <!-- Shelf reflection -->
  <rect x="0" y="482" width="1200" height="60" fill="url(#bgMetals)" opacity=".4"/>

  <!-- Perth Mint branding subtle -->
  <text x="600" y="640" font-family="Georgia,serif" font-size="11" fill="rgba(196,163,90,.25)" text-anchor="middle" letter-spacing="4">PERTH MINT · AUSTRALIAN SECURE CUSTODY</text>

  <!-- === GOLD BARS - stacked arrangement === -->

  <!-- Back gold bar (lower, behind) -->
  <g transform="translate(280, 280)" filter="url(#barShadow)" opacity=".7">
    <!-- Bar face -->
    <path d="M 0 40 L 220 40 L 220 160 L 0 160 Z" fill="url(#goldBar1)"/>
    <!-- Bar top -->
    <path d="M 20 20 L 240 20 L 220 40 L 0 40 Z" fill="url(#goldBarTop)"/>
    <!-- Bar right side -->
    <path d="M 240 20 L 240 140 L 220 160 L 220 40 Z" fill="url(#goldBarSide)"/>
    <!-- Engraving face -->
    <rect x="20" y="65" width="180" height="60" fill="none" stroke="rgba(0,0,0,.2)" stroke-width="1.5"/>
    <!-- Assay text -->
    <text x="110" y="90" font-family="Georgia,serif" font-size="11" fill="rgba(0,0,0,.4)" text-anchor="middle">999.9</text>
    <text x="110" y="107" font-family="Inter,sans-serif" font-size="8" fill="rgba(0,0,0,.35)" text-anchor="middle" letter-spacing="1">FINE GOLD</text>
    <text x="110" y="118" font-family="Inter,sans-serif" font-size="8" fill="rgba(0,0,0,.3)" text-anchor="middle">1 oz · 31.1g</text>
  </g>

  <!-- Front gold bar 1 (largest, center) -->
  <g transform="translate(200, 310)" filter="url(#barShadow)">
    <!-- Bar face -->
    <path d="M 0 40 L 240 40 L 240 165 L 0 165 Z" fill="url(#goldBar1)"/>
    <!-- Bar top -->
    <path d="M 24 16 L 264 16 L 240 40 L 0 40 Z" fill="url(#goldBarTop)"/>
    <!-- Bar right side -->
    <path d="M 264 16 L 264 141 L 240 165 L 240 40 Z" fill="url(#goldBarSide)"/>
    <!-- Decorative border on face -->
    <rect x="16" y="60" width="208" height="78" fill="none" stroke="rgba(0,0,0,.18)" stroke-width="1.5"/>
    <!-- Logo mark on bar -->
    <circle cx="120" cy="80" r="16" fill="none" stroke="rgba(0,0,0,.2)" stroke-width="1"/>
    <text x="120" y="85" font-family="Georgia,serif" font-size="14" fill="rgba(0,0,0,.3)" text-anchor="middle">V</text>
    <!-- Assay marks -->
    <text x="120" y="114" font-family="Georgia,serif" font-size="13" fill="rgba(0,0,0,.35)" text-anchor="middle">999.9</text>
    <text x="120" y="128" font-family="Inter,sans-serif" font-size="8" fill="rgba(0,0,0,.3)" text-anchor="middle" letter-spacing="2">FINE GOLD</text>
    <!-- Corner marks -->
    <line x1="20" y1="64" x2="35" y2="64" stroke="rgba(0,0,0,.2)" stroke-width="1"/>
    <line x1="20" y1="64" x2="20" y2="78" stroke="rgba(0,0,0,.2)" stroke-width="1"/>
    <line x1="220" y1="64" x2="205" y2="64" stroke="rgba(0,0,0,.2)" stroke-width="1"/>
    <line x1="220" y1="64" x2="220" y2="78" stroke="rgba(0,0,0,.2)" stroke-width="1"/>
    <!-- Shimmer on top -->
    <path d="M 24 16 L 264 16 L 240 40 L 0 40 Z" fill="rgba(255,248,200,.15)"/>
  </g>

  <!-- Gold bar 2 (right, angled) -->
  <g transform="translate(500, 330) rotate(-5)" filter="url(#barShadow)">
    <path d="M 0 35 L 210 35 L 210 150 L 0 150 Z" fill="url(#goldBar1)"/>
    <path d="M 20 14 L 230 14 L 210 35 L 0 35 Z" fill="url(#goldBarTop)"/>
    <path d="M 230 14 L 230 129 L 210 150 L 210 35 Z" fill="url(#goldBarSide)"/>
    <rect x="16" y="55" width="178" height="68" fill="none" stroke="rgba(0,0,0,.18)" stroke-width="1.5"/>
    <text x="105" y="93" font-family="Georgia,serif" font-size="13" fill="rgba(0,0,0,.35)" text-anchor="middle">999.9</text>
    <text x="105" y="108" font-family="Inter,sans-serif" font-size="8" fill="rgba(0,0,0,.3)" text-anchor="middle" letter-spacing="2">FINE GOLD</text>
  </g>

  <!-- === SILVER BARS === -->

  <!-- Silver bar 1 -->
  <g transform="translate(650, 340)" filter="url(#barShadow)">
    <path d="M 0 35 L 200 35 L 200 145 L 0 145 Z" fill="url(#silverBar1)"/>
    <path d="M 18 14 L 218 14 L 200 35 L 0 35 Z" fill="url(#silverBarTop)"/>
    <path d="M 218 14 L 218 124 L 200 145 L 200 35 Z" fill="url(#silverBarSide)"/>
    <rect x="14" y="52" width="172" height="62" fill="none" stroke="rgba(0,0,0,.12)" stroke-width="1.5"/>
    <text x="100" y="82" font-family="Georgia,serif" font-size="12" fill="rgba(0,0,0,.28)" text-anchor="middle">999</text>
    <text x="100" y="97" font-family="Inter,sans-serif" font-size="8" fill="rgba(0,0,0,.22)" text-anchor="middle" letter-spacing="2">FINE SILVER</text>
    <text x="100" y="108" font-family="Inter,sans-serif" font-size="8" fill="rgba(0,0,0,.2)" text-anchor="middle">1 kg · 32.15 oz</text>
    <!-- Shimmer -->
    <path d="M 18 14 L 218 14 L 200 35 L 0 35 Z" fill="rgba(255,255,255,.18)"/>
  </g>

  <!-- Silver bar 2 (stacked on 1) -->
  <g transform="translate(680, 295)" filter="url(#barShadow)">
    <path d="M 0 32 L 190 32 L 190 130 L 0 130 Z" fill="url(#silverBar1)"/>
    <path d="M 16 12 L 206 12 L 190 32 L 0 32 Z" fill="url(#silverBarTop)"/>
    <path d="M 206 12 L 206 110 L 190 130 L 190 32 Z" fill="url(#silverBarSide)"/>
    <rect x="12" y="48" width="164" height="54" fill="none" stroke="rgba(0,0,0,.12)" stroke-width="1"/>
    <text x="95" y="76" font-family="Georgia,serif" font-size="11" fill="rgba(0,0,0,.25)" text-anchor="middle">999</text>
    <text x="95" y="90" font-family="Inter,sans-serif" font-size="7" fill="rgba(0,0,0,.2)" text-anchor="middle" letter-spacing="2">FINE SILVER</text>
    <path d="M 16 12 L 206 12 L 190 32 L 0 32 Z" fill="rgba(255,255,255,.15)"/>
  </g>

  <!-- Gold coins scattered -->
  <!-- Coin 1 -->
  <g transform="translate(440, 450)">
    <ellipse cx="30" cy="8" rx="30" ry="8" fill="#A8832A" opacity=".8"/>
    <ellipse cx="30" cy="0" rx="30" ry="8" fill="url(#goldBarTop)"/>
    <circle cx="30" cy="0" r="22" fill="none" stroke="rgba(0,0,0,.2)" stroke-width="1"/>
    <text x="30" y="4" font-family="Georgia,serif" font-size="8" fill="rgba(0,0,0,.35)" text-anchor="middle">Au</text>
  </g>
  <!-- Coin 2 -->
  <g transform="translate(480, 445) rotate(12)">
    <ellipse cx="25" cy="7" rx="25" ry="7" fill="#A8832A" opacity=".8"/>
    <ellipse cx="25" cy="0" rx="25" ry="7" fill="url(#goldBarTop)"/>
    <circle cx="25" cy="0" r="18" fill="none" stroke="rgba(0,0,0,.2)" stroke-width="1"/>
    <text x="25" y="4" font-family="Georgia,serif" font-size="7" fill="rgba(0,0,0,.3)" text-anchor="middle">Au</text>
  </g>

  <!-- Right side text overlay -->
  <g transform="translate(900, 140)">
    <rect x="0" y="0" width="260" height="340" rx="20" fill="rgba(26,10,16,.7)" stroke="rgba(196,163,90,.2)" stroke-width="1"/>
    <!-- Vault logo -->
    <circle cx="36" cy="36" r="22" fill="#7D3D4A" stroke="rgba(196,163,90,.4)" stroke-width="1"/>
    <path d="M 28 28 L 36 44 L 44 28" stroke="rgba(255,236,190,.85)" stroke-width="3.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="66" y="31" font-family="Georgia,serif" font-size="18" fill="rgba(255,236,190,.85)" letter-spacing="3">VAULT</text>
    <text x="66" y="46" font-family="Inter,sans-serif" font-size="8" fill="rgba(196,163,90,.6)" letter-spacing="2">WEALTH TAB</text>

    <line x1="20" y1="70" x2="240" y2="70" stroke="rgba(196,163,90,.15)" stroke-width="1"/>

    <!-- Live price row -->
    <text x="20" y="100" font-family="Inter,sans-serif" font-size="9" fill="rgba(196,163,90,.6)" letter-spacing="2">LIVE AUD GOLD PRICE</text>
    <text x="20" y="125" font-family="Georgia,serif" font-size="26" fill="rgba(255,236,190,.9)">$4,282</text>
    <text x="132" y="125" font-family="Georgia,serif" font-size="16" fill="rgba(255,236,190,.7)">.50/g</text>
    <text x="20" y="142" font-family="Inter,sans-serif" font-size="9" fill="#C4A35A">↑ 2.3% today · Perth Mint pricing</text>

    <line x1="20" y1="158" x2="240" y2="158" stroke="rgba(196,163,90,.1)" stroke-width="1"/>

    <!-- Silver -->
    <text x="20" y="182" font-family="Inter,sans-serif" font-size="9" fill="rgba(196,163,90,.6)" letter-spacing="2">LIVE AUD SILVER PRICE</text>
    <text x="20" y="205" font-family="Georgia,serif" font-size="22" fill="rgba(200,210,230,.85)">$54</text>
    <text x="68" y="205" font-family="Georgia,serif" font-size="14" fill="rgba(200,210,230,.65)">.20/g</text>
    <text x="20" y="220" font-family="Inter,sans-serif" font-size="9" fill="#8090B0">↑ 0.8% today · Perth Mint pricing</text>

    <line x1="20" y1="236" x2="240" y2="236" stroke="rgba(196,163,90,.1)" stroke-width="1"/>

    <!-- My holdings -->
    <text x="20" y="258" font-family="Inter,sans-serif" font-size="9" fill="rgba(196,163,90,.6)" letter-spacing="2">MY HOLDINGS</text>
    <text x="20" y="278" font-family="Inter,sans-serif" font-size="11" fill="rgba(255,236,190,.75)">🥇  2.5g Gold</text>
    <text x="200" y="278" font-family="Inter,sans-serif" font-size="11" fill="rgba(255,236,190,.75)" text-anchor="end">$10,706</text>
    <text x="20" y="298" font-family="Inter,sans-serif" font-size="11" fill="rgba(200,210,230,.65)">🥈  0g Silver</text>
    <text x="200" y="298" font-family="Inter,sans-serif" font-size="11" fill="rgba(200,210,230,.65)" text-anchor="end">$0</text>

    <line x1="20" y1="312" x2="240" y2="312" stroke="rgba(196,163,90,.1)" stroke-width="1"/>

    <!-- CTA -->
    <rect x="20" y="322" width="220" height="32" rx="8" fill="#5C2E38"/>
    <text x="130" y="342" font-family="Inter,sans-serif" font-size="11" fill="white" font-weight="600" text-anchor="middle">Buy from $50 →</text>
  </g>

  <!-- Perth Mint partner badge bottom right -->
  <g transform="translate(900, 510)">
    <rect x="0" y="0" width="260" height="48" rx="10" fill="rgba(26,10,16,.6)" stroke="rgba(196,163,90,.15)" stroke-width="1"/>
    <text x="20" y="20" font-family="Inter,sans-serif" font-size="8" fill="rgba(196,163,90,.5)" letter-spacing="2">CUSTODY PARTNER</text>
    <text x="20" y="38" font-family="Georgia,serif" font-size="14" fill="rgba(255,236,190,.6)" letter-spacing="2">Perth Mint</text>
    <text x="240" y="30" font-family="Inter,sans-serif" font-size="9" fill="rgba(196,163,90,.4)" text-anchor="end">Est. 1899 · Australian Government</text>
  </g>

  <!-- Subtle scan lines for depth -->
  <rect width="1200" height="675" fill="none" stroke="rgba(0,0,0,.02)" stroke-width="2" stroke-dasharray="2 30"/>
</svg>
